<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Replay - Tetris</title>
  <style>
    :root { --block: 30px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    #wrapper { display: flex; flex-direction: column; }
    #game-container {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    canvas#board { border: 2px solid #444; }

    #left-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 604px;
      color: #ccc;
      font-family: monospace;
      font-size: 14px;
    }
    canvas#hold { display: block; }
    #score-area { display: flex; flex-direction: column; gap: 4px; }
    #score-val, #lines-val { font-size: 18px; color: #fff; }

    #right-panel {
      display: flex;
      flex-direction: column;
      gap: calc(var(--block) * 1.0);
      color: #ccc;
      font-family: monospace;
      font-size: 14px;
    }
    canvas.next { display: block; }

    .label { color: #888; margin-bottom: 4px; }

    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
      font-family: monospace;
      color: #ccc;
      font-size: 13px;
      position: relative;
    }
    #play-pause-btn {
      min-width: 90px;
    }
    #controls button, #controls select {
      background: #1e1e1e;
      border: 1px solid #444;
      color: #fff;
      padding: 6px 14px;
      font-family: monospace;
      font-size: 13px;
      border-radius: 3px;
      cursor: pointer;
    }
    #controls button:hover, #controls select:hover { border-color: #5af; }
    #frame-val { color: #fff; min-width: 100px; }
    #seed-val { color: #555; position: absolute; right: 0; font-size: 11px; }

    #status {
      color: #888;
      font-family: monospace;
      font-size: 14px;
      padding: 40px;
      text-align: center;
    }
  </style>
</head>
<body>
<div id="wrapper">
  <div id="status"></div>
  <div id="game-container">
    <div id="left-panel">
      <div id="hold-area">
        <div class="label">HOLD</div>
        <canvas id="hold"></canvas>
      </div>
      <div id="score-area">
        <div class="label">SCORE</div>
        <div id="score-val">0</div>
        <div class="label" style="margin-top:8px">LINES</div>
        <div id="lines-val">0</div>
      </div>
    </div>

    <canvas id="attack-gauge" width="12" height="600" style="margin-right: 4px; border: 1px solid #444; background: #111;"></canvas>
    <canvas id="board"></canvas>

    <div id="right-panel">
      <div class="label">NEXT</div>
      <canvas class="next" id="next0"></canvas>
      <canvas class="next" id="next1"></canvas>
      <canvas class="next" id="next2"></canvas>
      <canvas class="next" id="next3"></canvas>
      <canvas class="next" id="next4"></canvas>
    </div>
  </div>

  <div id="controls">
    <button id="play-pause-btn">一時停止</button>
    <button id="undo-btn">1手戻る</button>
    <button id="restart-btn">最初から</button>
    <label>速度
      <select id="speed-sel">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="4">4x</option>
        <option value="8">8x</option>
        </select>
        </label>
        <span id="frame-val">0 / 0</span>

    <span id="seed-val"></span>
  </div>
  <div style="margin-top:8px;color:#555;font-family:monospace;font-size:11px">
    Space: 再生/停止 &nbsp; → (押下中): 早送り &nbsp; ← (押下中): 巻戻し &nbsp; Backspace: 1手戻る &nbsp; PgDn: ここからプレイ
  </div>
</div>
<script type="module" src="js/replay/player.js"></script>
</body>
</html>
